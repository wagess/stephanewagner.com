name: Deploy to Dreamhost

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          PUBLIC_UPSTASH_REDIS_REST_URL: ${{ secrets.PUBLIC_UPSTASH_REDIS_REST_URL }}
          PUBLIC_UPSTASH_REDIS_REST_TOKEN: ${{ secrets.PUBLIC_UPSTASH_REDIS_REST_TOKEN }}

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete
          path: dist/
          remote_path: /home/wagess/stephanewagner.com/public/
          remote_host: pdx1-shared-a1-34.dreamhost.com
          remote_user: wagess
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
