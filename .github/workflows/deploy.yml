name: Deploy to Dreamhost

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          PUBLIC_UPSTASH_REDIS_REST_URL: ${{ secrets.PUBLIC_UPSTASH_REDIS_REST_URL }}
          PUBLIC_UPSTASH_REDIS_REST_TOKEN: ${{ secrets.PUBLIC_UPSTASH_REDIS_REST_TOKEN }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d ' ' | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -l -f ~/.ssh/id_ed25519
          ssh-keyscan -H pdx1-shared-a1-34.dreamhost.com >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
            dist/ \
            wagess@pdx1-shared-a1-34.dreamhost.com:/home/wagess/stephanewagner.com/public/
