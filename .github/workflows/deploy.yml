name: Deploy to Dreamhost

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          PUBLIC_UPSTASH_REDIS_REST_URL: ${{ secrets.PUBLIC_UPSTASH_REDIS_REST_URL }}
          PUBLIC_UPSTASH_REDIS_REST_TOKEN: ${{ secrets.PUBLIC_UPSTASH_REDIS_REST_TOKEN }}

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add Dreamhost to known hosts
        run: ssh-keyscan -H pdx1-shared-a1-34.dreamhost.com >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            dist/ \
            wagess@pdx1-shared-a1-34.dreamhost.com:/home/wagess/stephanewagner.com/public/
